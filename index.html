<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hearts">
    <span>💖</span>
    <span>💕</span>
    <span>💗</span>
    <span>💘</span>
    <span>💞</span>
  </div>

  <div class="card">
    <p class="small-text">Aku punya satu pertanyaan...</p>
    <h1 id="title">Mau jadi pacarku?</h1>
    <p class="desc">Jawab yang bener ya, tombolnya punya perasaan juga soalnya.</p>

    <div class="buttons">
      <button id="yes">YES 💖</button>
      <button id="no">NO 😭</button>
    </div>

    <h2 id="message"></h2>
  </div>

  <audio id="wrongSound" src="wrong-answer-buzzer.mp3"></audio>
  <audio id="correctSound" src="correct.mp3"></audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
