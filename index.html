<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Untuk Kamu</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

  <!-- STYLE -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Poppins", sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;

      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6), transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(255,120,180,0.7), transparent 25%),
        radial-gradient(circle at 50% 90%, rgba(255,210,120,0.7), transparent 30%),
        linear-gradient(135deg, #ff4f8b, #ff7eb3, #8e44ff, #3b1d78);
    }

    body::before {
      content: "";
      position: absolute;
      inset: -40%;
      background: conic-gradient(
        rgba(255,255,255,0.15),
        rgba(255,105,180,0.25),
        rgba(142,68,255,0.25),
        rgba(255,200,100,0.2),
        rgba(255,255,255,0.15)
      );
      animation: spin 12s linear infinite;
      filter: blur(60px);
    }

    .card {
      width: min(92vw, 380px);
      padding: 35px 20px;
      border-radius: 30px;
      text-align: center;
      color: white;
      position: relative;
      z-index: 2;

      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);

      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    }

    h1 {
      font-family: "Pacifico", cursive;
      font-size: 38px;
      margin: 10px 0;
      background: linear-gradient(90deg, #fff, #ffe0f0, #fff6b7);
      -webkit-background-clip: text;
      color: transparent;
    }

    .desc {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .buttons {
      position: relative;
      height: 220px;
    }

    button {
      position: absolute;
      border: none;
      border-radius: 999px;
      font-family: "Poppins", sans-serif;
      font-weight: 800;
      cursor: pointer;
      color: white;
      transition: 0.2s;
    }

    #yes {
      left: 10%;
      top: 60px;
      font-size: 20px;
      padding: 14px 30px;
      background: linear-gradient(135deg, #00ff99, #00c9ff);
    }

    #no {
      right: 10%;
      top: 60px;
      font-size: 20px;
      padding: 14px 30px;
      background: linear-gradient(135deg, #ff335f, #ff8a00);
    }

    #message {
      margin-top: 10px;
      font-size: 24px;
      font-weight: 600;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

  </style>
</head>
<body>

  <div class="card">
    <h1 id="title">Mau jadi pacarku?</h1>
    <p class="desc">Jawab jujur ya... walaupun tombolnya agak bandel 😈</p>

    <div class="buttons">
      <button id="yes">YES 💖</button>
      <button id="no">NO 😭</button>
    </div>

    <h2 id="message"></h2>
  </div>

  <!-- AUDIO -->
  <audio id="wrongSound" src="wrong-answer-buzzer.mp3"></audio>
  <audio id="correctSound" src="correct.mp3"></audio>

  <!-- CONFETTI -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <!-- SCRIPT -->
  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const message = document.getElementById("message");
    const title = document.getElementById("title");

    const wrongSound = document.getElementById("wrongSound");
    const correctSound = document.getElementById("correctSound");

    let count = 0;
    let yesSize = 20;

    noBtn.addEventListener("click", () => {
      count++;

      wrongSound.currentTime = 0;
      wrongSound.play();

      const x = Math.random() * 200 - 100;
      const y = Math.random() * 150 - 75;

      noBtn.style.transform = `translate(${x}px, ${y}px)`;

      yesSize += 8;
      yesBtn.style.fontSize = yesSize + "px";
      yesBtn.style.padding = `${yesSize/1.5}px ${yesSize}px`;

      if (count >= 5) {
        noBtn.style.display = "none";
      }
    });

    yesBtn.addEventListener("click", () => {
      correctSound.currentTime = 0;
      correctSound.play();

      title.innerText = "YEAYYY 💖";
      message.innerText = "Makasih udah mau nerima aku 💕";

      noBtn.style.display = "none";
      yesBtn.style.display = "none";

      confetti({
        particleCount: 200,
        spread: 100,
        origin: { y: 0.6 }
      });
    });
  </script>

</body>
</html>
